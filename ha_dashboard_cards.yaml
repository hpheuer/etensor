# ============================================================
#  E-Tensor – Dashboard Karten
#  In HA Dashboard → "Raw-Konfigurationseditor" einfügen
# ============================================================

type: vertical-stack
cards:

  # Start-Button – nur sichtbar wenn idle oder done
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.etensor_status
        state_not: running
    card:
      type: button
      name: Messung starten
      icon: mdi:brain
      icon_height: 60px
      tap_action:
        action: call-service
        service: rest_command.etensor_start

  # Läuft-Anzeige – nur sichtbar während Messung
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.etensor_status
        state: running
    card:
      type: markdown
      content: >
        <div style="text-align:center; font-size:2em; padding:20px;
                    background:#1a1a2e; border-radius:8px;">
          ⏳ Messung läuft...
        </div>

  # Ergebnis (Daumen)
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.etensor_status
        state: done
    card:
      type: entity
      entity: sensor.etensor_result
      name: Ergebnis
      attribute: state

  # Detail-Sensoren
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.etensor_status
        state: done
    card:
      type: entities
      title: Details
      entities:
        - entity: sensor.etensor_zscore
          name: Z-Score
        - entity: sensor.etensor_pvalue
          name: p-Wert
        - entity: sensor.etensor_direction
          name: Richtung
        - entity: sensor.etensor_chisq
          name: Chi²
        - entity: sensor.etensor_baseline
          name: Baseline
